name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Vérifier la compatibilité modèle-données
        run: >-
          python scripts/validate_workflow_data.py
          data/workflows/projet-informatique/manifest.json

      - name: Vérifier la traçabilité exigences-code-tests
        run: python scripts/validate_traceability.py

      - name: Exécuter les tests unitaires et fonctionnels
        run: python -m unittest discover -s tests -v
